services:
  backend:
    build: ./backend
    container_name: blog-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - LISTEN_ADDR=:8080
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET to a random value of at least 32 characters}
      - INITIAL_PASSWORD=${INITIAL_PASSWORD:?set INITIAL_PASSWORD to a strong admin password}
      - DB_PATH=/app/data/blog.db
      - UPLOAD_DIR=/app/uploads
      - LOG_LEVEL=info
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - MAX_FILE_SIZE=52428800
      - MAX_TOTAL_SIZE=104857600
    volumes:
      - blog_db_data:/app/data
      - blog_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: blog-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080/api
      - NEXT_PUBLIC_UPLOADS_URL=http://backend:8080/uploads
    depends_on:
      backend:
        condition: service_healthy

volumes:
  blog_db_data:
  blog_uploads:
